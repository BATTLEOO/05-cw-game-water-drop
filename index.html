<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <header class="brand-header" aria-label="charity water branding">
            <img class="brand-logo" src="img/cw_logo-horizontal.png" alt="charity: water logo">
        </header>
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <div class="challenge">Challenge: <span id="challenge-status">Calm</span></div>
            <button id="start-btn">Start Game</button>
        </div>
        <p id="feedback-message" class="feedback-message">
            <img class="feedback-icon" src="img/water-can-transparent.png" alt="Water can icon">
            <span>Tap clean drops to score. Avoid dirty drops.</span>
        </p>
        
        <div id="game-container">
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
